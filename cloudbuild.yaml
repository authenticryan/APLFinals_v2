steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--tag'
      - 'asia-south1-docker.pkg.dev/calm-virtue-497206-t4/ipl-repo/ipl-companion:latest'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/calm-virtue-497206-t4/ipl-repo/ipl-companion:latest']

images:
  - 'asia-south1-docker.pkg.dev/calm-virtue-497206-t4/ipl-repo/ipl-companion:latest'

substitutions:
  _VITE_FIREBASE_API_KEY: 'YOUR_KEY'
  _VITE_FIREBASE_AUTH_DOMAIN: 'YOUR_DOMAIN'
  _VITE_FIREBASE_PROJECT_ID: 'YOUR_PROJECT'
  _VITE_FIREBASE_STORAGE_BUCKET: 'YOUR_BUCKET'
  _VITE_FIREBASE_MESSAGING_SENDER_ID: 'YOUR_SENDER'
  _VITE_FIREBASE_APP_ID: 'YOUR_APP_ID'
  _VITE_GEMINI_API_KEY: 'YOUR_GEMINI_KEY'

options:
  logging: CLOUD_LOGGING_ONLY
